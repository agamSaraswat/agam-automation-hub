# ════════════════════════════════════════
# Job Search Configuration
# ════════════════════════════════════════

target_roles:
  - "Senior Data Scientist"
  - "Lead Data Scientist"
  - "Applied AI Lead"
  - "Principal Data Scientist"
  - "Healthcare ML Engineer"
  - "AI Governance Lead"
  - "ML Platform Engineer"
  - "Staff Data Scientist"
  - "Data Science Manager"
  - "NLP Engineer"

locations:
  - "United States"
  - "Remote"
  - "Massachusetts"
  - "Boston, MA"
  - "New York, NY"

# Keywords to boost in search queries
keywords:
  primary:
    - "data scientist healthcare"
    - "machine learning healthcare"
    - "NLP data scientist"
    - "senior data scientist"
    - "lead data scientist"
    - "applied AI"
  secondary:
    - "MLOps engineer"
    - "ML platform"
    - "AI governance"
    - "healthcare analytics"

# Companies of particular interest
priority_companies:
  - "Humana"
  - "UnitedHealth Group"
  - "CVS Health"
  - "Anthem"
  - "Kaiser Permanente"
  - "Cigna"
  - "Epic Systems"
  - "Tempus"
  - "Flatiron Health"
  - "Google Health"
  - "Microsoft Health"
  - "Amazon Health"
  - "Meta"
  - "Apple"

# Sources configuration
sources:
  remoteok:
    enabled: true
    url: "https://remoteok.com/api"
    tags:
      - "data-science"
      - "machine-learning"
      - "python"

  himalayas:
    enabled: true
    url: "https://himalayas.app/jobs/api"
    categories:
      - "data-science"
      - "machine-learning"

  indeed_rss:
    enabled: true
    base_url: "https://www.indeed.com/rss"

  linkedin_rss:
    enabled: true
    base_url: "https://www.linkedin.com/jobs/search/"

# Filters
filters:
  min_experience_years: 3
  max_experience_years: 10
  # Explicit relevance controls for queue quality
  include_keywords:
    - "data scientist"
    - "machine learning"
    - "nlp"
    - "predictive analytics"
    - "healthcare"
    - "ai governance"
  exclude_keywords:
    - "sales"
    - "account executive"
    - "frontend"
    - "android"
    - "ios"
    - "qa tester"
  include_titles:
    - "senior data scientist"
    - "lead data scientist"
    - "staff data scientist"
    - "principal data scientist"
    - "healthcare ml engineer"
    - "nlp engineer"
  exclude_titles:
    - "intern"
    - "junior"
    - "entry level"
    - "director"
    - "VP"
    - "vice president"
  preferred_locations:
    - "remote"
    - "united states"
    - "massachusetts"
    - "boston"
    - "new york"
  remote_preference: true
  minimum_match_threshold: 35
  exclude_companies: []
